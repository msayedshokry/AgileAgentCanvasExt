name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs when a new commit is pushed to the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════════════════
  # Extension — Typecheck, Lint, Build
  # ═══════════════════════════════════════════════════════════════════════
  extension-build:
    name: Extension (Build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Delete lock file so npm install resolves fresh from package.json
      # (lock files generated on Windows npm 11.x have incompatible integrity
      #  hashes for Linux npm 10.x on the GitHub Actions runner)
      - run: rm -f package-lock.json && npm install

      - name: TypeCheck
        run: npm run check-types

      - name: Lint
        run: npm run lint || true

      - name: Lint Changelog
        run: npm run lint:changelog || true

      - name: Bundle Extension
        run: npm run bundle

  # ═══════════════════════════════════════════════════════════════════════
  # Cucumber BDD Tests — 4 categories running in parallel
  # ═══════════════════════════════════════════════════════════════════════

  cucumber-artifacts:
    name: Cucumber (Artifacts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: rm -f package-lock.json && npm install
      - name: Run Artifacts Tests
        run: npx cucumber-js --profile ci-artifacts
        continue-on-error: true
      - name: Upload JSON Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report-artifacts
          path: reports/cucumber-report-artifacts.json
          retention-days: 7

  cucumber-workflow:
    name: Cucumber (Workflow)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: rm -f package-lock.json && npm install
      - name: Run Workflow Tests
        run: npx cucumber-js --profile ci-workflow
        continue-on-error: true
      - name: Upload JSON Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report-workflow
          path: reports/cucumber-report-workflow.json
          retention-days: 7

  cucumber-views:
    name: Cucumber (Views)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: rm -f package-lock.json && npm install
      - name: Run Views Tests
        run: npx cucumber-js --profile ci-views
        continue-on-error: true
      - name: Upload JSON Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report-views
          path: reports/cucumber-report-views.json
          retention-days: 7

  cucumber-agents:
    name: Cucumber (Agents)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: rm -f package-lock.json && npm install
      - name: Run Agents Tests
        run: npx cucumber-js --profile ci-agents
        continue-on-error: true
      - name: Upload JSON Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report-agents
          path: reports/cucumber-report-agents.json
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════
  # Webview — Typecheck, Lint, Build, Vitest
  # ═══════════════════════════════════════════════════════════════════════
  webview:
    name: Webview (Build + Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webview-ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: rm -f package-lock.json && npm install

      - name: TypeCheck
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src --ext .ts,.tsx 2>/dev/null || true

      - name: Vitest Tests
        run: npm test
        continue-on-error: true

      - name: Build Webview
        run: npm run build

      - name: Upload Vitest Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-results
          path: webview-ui/coverage/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════
  # Full Compile (end-to-end integration check)
  # ═══════════════════════════════════════════════════════════════════════
  full-compile:
    name: Full Compile (Extension + Webview)
    runs-on: ubuntu-latest
    needs: [extension-build, cucumber-artifacts, cucumber-workflow, cucumber-views, cucumber-agents, webview]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: rm -f package-lock.json && npm install
      - run: cd webview-ui && rm -f package-lock.json && npm install

      - name: Full Compile
        run: npm run compile

  # ═══════════════════════════════════════════════════════════════════════
  # Test Summary
  # ═══════════════════════════════════════════════════════════════════════
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [extension-build, cucumber-artifacts, cucumber-workflow, cucumber-views, cucumber-agents, webview]
    if: always()
    steps:
      - name: Check Results
        run: |
          echo "### CI Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Extension Build | ${{ needs.extension-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cucumber (Artifacts) | ${{ needs.cucumber-artifacts.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cucumber (Workflow) | ${{ needs.cucumber-workflow.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cucumber (Views) | ${{ needs.cucumber-views.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cucumber (Agents) | ${{ needs.cucumber-agents.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Webview Build+Test | ${{ needs.webview.result }} |" >> $GITHUB_STEP_SUMMARY
