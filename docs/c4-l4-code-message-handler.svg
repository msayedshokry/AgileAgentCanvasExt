<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 832 1440" width="832" height="1440">
  <rect width="832" height="1440" fill="#ffffff"/>
  <text x="16" y="30" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">╔══════════════════════════════════════════════════════════════════════════════════════════════╗</text>
  <text x="16" y="46" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">║  AGENTIC-KANBAN-MESSAGE-HANDLER  ·  C4 Code Diagram (Level 4)                                 ║</text>
  <text x="16" y="62" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">║  Component: Kanban Message Handler                                                            ║</text>
  <text x="16" y="78" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">║  Source:   src/views/agentic-kanban-message-handler.ts                                        ║</text>
  <text x="16" y="94" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">╚══════════════════════════════════════════════════════════════════════════════════════════════╝</text>
  <text x="16" y="110" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve"></text>
  <text x="16" y="126" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   ┌──────────────────────────────────────────────────────────────────────────────────────────────┐</text>
  <text x="16" y="142" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  module: agentic-kanban-message-handler.ts                                                  │</text>
  <text x="16" y="158" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │                                                                                            │</text>
  <text x="16" y="174" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  ┌────────────────────────────────────────────────────────────────────────────────────┐     │</text>
  <text x="16" y="190" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │  §1  Types  (export type)                                                          │     │</text>
  <text x="16" y="206" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │                                                                                    │     │</text>
  <text x="16" y="222" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │    type Envelope&lt;T extends MessageKind&gt; = {                                         │     │</text>
  <text x="16" y="238" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │      v: 1;                       // schema version                                 │     │</text>
  <text x="16" y="254" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │      id: string;                 // correlation id                                 │     │</text>
  <text x="16" y="270" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │      ts: number;                 // epoch ms (host clock)                          │     │</text>
  <text x="16" y="286" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │      kind: T;                    // discriminator                                  │     │</text>
  <text x="16" y="302" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │      payload: PayloadFor&lt;T&gt;;                                                    │     │</text>
  <text x="16" y="318" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │    }                                                                               │     │</text>
  <text x="16" y="334" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │                                                                                    │     │</text>
  <text x="16" y="350" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │    type MessageKind =                                                              │     │</text>
  <text x="16" y="366" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │      | &#x27;kanban.card.move&#x27;              // host → webview: applied transition        │     │</text>
  <text x="16" y="382" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │      | &#x27;kanban.card.request&#x27;           // webview → host: user-driven request      │     │</text>
  <text x="16" y="398" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │      | &#x27;kanban.policy.snapshot&#x27;        // host → webview: current policy mirror     │     │</text>
  <text x="16" y="414" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │      | &#x27;kanban.approval.request&#x27;       // host → webview: ask user to approve        │     │</text>
  <text x="16" y="430" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │      | &#x27;kanban.approval.respond&#x27;       // webview → host: user&#x27;s decision           │     │</text>
  <text x="16" y="446" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │      | &#x27;kanban.fleet.snapshot&#x27;         // host → webview: multi-agent status        │     │</text>
  <text x="16" y="462" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │      | &#x27;kanban.error&#x27;                  // either side: recoverable error             │     │</text>
  <text x="16" y="478" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │      | &#x27;kanban.ready&#x27;                  // webview → host: client initialised         │     │</text>
  <text x="16" y="494" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │                                                                                    │     │</text>
  <text x="16" y="510" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │    type Verdict = &#x27;allow&#x27; | &#x27;deny&#x27; | &#x27;require_human&#x27;                                │     │</text>
  <text x="16" y="526" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  └────────────────────────────────────────────────────────────────────────────────────┘     │</text>
  <text x="16" y="542" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │                                            ▲                                                │</text>
  <text x="16" y="558" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │                                            │  zod-validated                                │</text>
  <text x="16" y="574" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │                                            │                                                │</text>
  <text x="16" y="590" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  ┌────────────────────────────────────────────────────────────────────────────────────┐     │</text>
  <text x="16" y="606" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │  §2  Schemas  (export const, zod)                                                  │     │</text>
  <text x="16" y="622" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │                                                                                    │     │</text>
  <text x="16" y="638" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │    CardMovePayload       = z.object({ cardId, from, to, at })                      │     │</text>
  <text x="16" y="654" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │    CardRequestPayload    = z.object({ cardId, action, reason: z.string().optional()})│    │</text>
  <text x="16" y="670" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │    PolicySnapshotPayload = z.object({ level, gates, recentBlocks: z.array(BlockRec) })│   │</text>
  <text x="16" y="686" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │    ApprovalRequestPayload= z.object({ actionId, summary, expiresAt })              │     │</text>
  <text x="16" y="702" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │    ApprovalRespondPayload= z.object({ actionId, decision: z.enum([&#x27;allow&#x27;,&#x27;deny&#x27;]) })│    │</text>
  <text x="16" y="718" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │    FleetSnapshotPayload  = z.object({ agents: z.array(AgentStatus) })              │     │</text>
  <text x="16" y="734" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │    ErrorPayload          = z.object({ code, message, recoverable: z.boolean() })   │     │</text>
  <text x="16" y="750" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │    ReadyPayload          = z.object({ clientVersion: z.literal(1) })               │     │</text>
  <text x="16" y="766" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │                                                                                    │     │</text>
  <text x="16" y="782" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │    EnvelopeSchemas = z.discriminatedUnion(&#x27;kind&#x27;, [                                │     │</text>
  <text x="16" y="798" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │      CardMove, CardRequest, PolicySnapshot, ApprovalRequest,                       │     │</text>
  <text x="16" y="814" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │      ApprovalRespond, FleetSnapshot, Error, Ready,                                 │     │</text>
  <text x="16" y="830" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │    ])                                                                              │     │</text>
  <text x="16" y="846" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  └────────────────────────────────────────────────────────────────────────────────────┘     │</text>
  <text x="16" y="862" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │                                            ▲                                                │</text>
  <text x="16" y="878" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │                                            │  constructed by                              │</text>
  <text x="16" y="894" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │                                            │                                                │</text>
  <text x="16" y="910" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  ┌────────────────────────────────────────────────────────────────────────────────────┐     │</text>
  <text x="16" y="926" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │  §3  Handler  (export class KanbanMessageHandler)                                  │     │</text>
  <text x="16" y="942" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │                                                                                    │     │</text>
  <text x="16" y="958" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │   │    constructor(deps: {                                                            │     │</text>
  <text x="16" y="974" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │      webview:       Webview,              // VS Code webview handle                │     │</text>
  <text x="16" y="990" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │      orchestrator:  KanbanOrchestrator,   // FSM                                  │     │</text>
  <text x="16" y="1006" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │      policyEngine:  PolicyEngine,         // verdict source                       │     │</text>
  <text x="16" y="1022" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │      blocks:        RecentBlocksTracker,  // dedup store                          │     │</text>
  <text x="16" y="1038" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │      logger:        Logger,               // structured logger                    │     │</text>
  <text x="16" y="1054" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │    })                                                                              │     │</text>
  <text x="16" y="1070" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │                                                                                    │     │</text>
  <text x="16" y="1086" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │    onDidReceiveMessage(raw: unknown): void       ◄── main entry (one per session)  │     │</text>
  <text x="16" y="1102" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │      1. EnvelopeSchemas.safeParse(raw)                                              │     │</text>
  <text x="16" y="1118" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │      2. switch (envelope.kind)                                                     │     │</text>
  <text x="16" y="1134" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │         case &#x27;kanban.card.request&#x27;     → orchestrator.request(envelope.payload)    │     │</text>
  <text x="16" y="1150" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │         case &#x27;kanban.approval.respond&#x27; → orchestrator.applyDecision(payload)        │     │</text>
  <text x="16" y="1166" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │         case &#x27;kanban.ready&#x27;            → this.sendInitialSnapshots()               │     │</text>
  <text x="16" y="1182" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │         default                       → this.reply(err, &#x27;kanban.error&#x27;, {...})     │     │</text>
  <text x="16" y="1198" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │                                                                                    │     │</text>
  <text x="16" y="1214" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │    send&lt;T&gt;(envelope: Envelope&lt;T&gt;): void        ◄── host → webview                 │     │</text>
  <text x="16" y="1230" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │      webview.postMessage(envelope)                                                │     │</text>
  <text x="16" y="1246" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │                                                                                    │     │</text>
  <text x="16" y="1262" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │    sendInitialSnapshots(): void                                                    │     │</text>
  <text x="16" y="1278" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │      this.send({ kind: &#x27;kanban.policy.snapshot&#x27;, payload: this.snapshot() })       │     │</text>
  <text x="16" y="1294" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │      this.send({ kind: &#x27;kanban.fleet.snapshot&#x27;,   payload: this.fleet()    })       │     │</text>
  <text x="16" y="1310" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │                                                                                    │     │</text>
  <text x="16" y="1326" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │    private reply&lt;T&gt;(inReplyTo: string, kind: T, payload): void                     │     │</text>
  <text x="16" y="1342" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │      enforces correlation id; single error envelope per inbound                    │     │</text>
  <text x="16" y="1358" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │                                                                                    │     │</text>
  <text x="16" y="1374" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  │    dispose(): void       ◄── teardown: removes listener, clears buffers             │     │</text>
  <text x="16" y="1390" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │  └────────────────────────────────────────────────────────────────────────────────────┘     │</text>
  <text x="16" y="1406" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   │                                                                                            │</text>
  <text x="16" y="1422" font-family="Menlo, Consolas, 'Courier New', monospace" font-size="12" xml:space="preserve">   └──────────────────────────────────────────────────────────────────────────────────────────────┘</text>
</svg>