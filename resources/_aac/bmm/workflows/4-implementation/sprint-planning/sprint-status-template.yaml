# Sprint Status Template
# This is an EXAMPLE showing the expected format
# The actual file will be generated with sprint groupings derived from your epic files

# generated: {date}
# project: {project_name}
# project_key: {project_key}
# tracking_system: {tracking_system}
# story_location: {story_location}

# SPRINT NOTES:
# =============
# - Sprints are goal-based groupings, not time-boxes (though dates are optional)
# - Each sprint has a clear delivery objective (e.g. "MVP scope", "Beta launch")
# - Stories not listed in any sprint appear as "Unscheduled" in the board view
# - Sprint IDs can be any identifier: sprint_1, mvp, beta, hardening, etc.
#
# IMPORTANT — Story/Epic STATUSES are NOT stored here.
# They are the single source of truth in the individual JSON artifact files.
# The AgileAgentCanvas canvas reads statuses directly from those files.

# EXAMPLE STRUCTURE (your actual epics/stories will replace these):

generated: "YYYY-MM-DD HH:MM"  # placeholder — actual value is system-generated
project: My Awesome Project
project_key: NOKEY
tracking_system: file-system
story_location: "{story_location}"

sprints:
  sprint_1:
    goal: "MVP scope — core authentication and account management"
    stories:
      - epic-1
      - 1-1-user-authentication
      - 1-2-account-management
      - epic-1-retrospective

  sprint_2:
    goal: "Personality and chat foundation"
    stories:
      - epic-2
      - 1-3-plant-data-model
      - 1-4-add-plant-manual
      - 2-1-personality-system
      - 2-2-chat-interface
      - 2-3-llm-integration
      - epic-2-retrospective
